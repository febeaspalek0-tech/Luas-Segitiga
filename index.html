<!DOCTYPE html>
<html>
<head>
<style>
body {
  font-family: Arial;
}
</style>
</head>
<body>

<h3>Hitung Luas Segitiga</h3>

Alas: <input type="number" id="alas"><br><br>
Tinggi: <input type="number" id="tinggi"><br><br>

<button onclick="hitung()">Hitung</button>

<p id="hasil"></p>

<script>
function hitung() {
  var alas = document.getElementById("alas").value;
  var tinggi = document.getElementById("tinggi").value;

  var luas = 0.5 * alas * tinggi;

  document.getElementById("hasil").innerHTML = "Luas: " + luas;
}
</script>

</body>
</html>
